<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shooting Stars</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Entry fade veil -->
  <div id="veil"></div>

  <!-- Custom cursor -->
  <div id="cursor"></div>

  <!-- Three.js canvas mount point -->
  <div id="canvas-container"></div>

  <!-- ── HUD ─────────────────────────────────────────────────────── -->
  <div id="hud">
    <div id="title">
      <h1>Shooting Stars</h1>
      <p>#StanDareToPost &nbsp;·&nbsp; today's dreamers</p>
    </div>
    <div id="counter">
      <div class="num"><span id="found">0</span></div>
      <div class="label">of <span id="total">0</span> discovered</div>
    </div>
    <div id="hint">
      scroll to fly deeper &nbsp;·&nbsp; drag or arrow keys to explore &nbsp;·&nbsp; click a star
    </div>
  </div>

  <!-- Star hover tooltip -->
  <div id="star-tooltip">
    <div class="tt-name" id="tt-name">@username</div>
    <div class="tt-sub">click to reveal</div>
  </div>

  <!-- ── Letterbox overlay ────────────────────────────────────────
       Landscape → [slim bar] [ 9:16 door-frame | meta panel ] [slim bar]
       Portrait  → [bar] [ door-frame ] [ meta panel ] [bar]            -->
  <div id="letterbox">
    <div class="lb-bar"></div>

    <div id="lb-stage">

      <!-- Outer "door" border shell -->
      <div id="lb-frame-outer">
        <!-- Inner frame — clips media to rounded rect -->
        <div id="lb-frame">
          <!-- Placeholder shown while media loads -->
          <div class="lb-avatar" id="lb-avatar">✦</div>
          <div class="lb-frame-uname" id="lb-frame-uname">@username</div>
          <div class="lb-frame-tag">#StanDareToPost</div>
          <div class="lb-frame-line"></div>
          <!-- Injected media (.lb-media) goes here -->
          <!-- Clickable overlay — whole image/video links to Instagram -->
          <a id="lb-frame-link" href="#" target="_blank" rel="noopener" aria-label="View on Instagram"></a>
        </div>
      </div>

      <!-- Meta panel: close pinned top-right, post info vertically centered -->
      <div id="lb-meta-panel">

        <div id="lb-meta-top">
          <button id="lb-close">esc &nbsp; ✕</button>
        </div>

        <div id="lb-meta-content">
          <div class="lb-panel-uname" id="lb-panel-uname">@username</div>
          <div class="lb-panel-line"></div>
          <div class="lb-panel-dream" id="lb-panel-dream">their first step into the light</div>
          <a class="lb-ig-text-link" id="lb-post-link" href="#" target="_blank" rel="noopener" style="display:none;">
            view on instagram ↗
          </a>
        </div>

      </div>
    </div>

    <div class="lb-bar"></div>
  </div>

  <!-- ── Scripts ──────────────────────────────────────────────────
       Three.js loaded first (global), then ES modules.
       type="module" defers automatically and scopes imports.      -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script type="module" src="scripts/main.js"></script>

  <!-- Wire close button after modules load — keeps HTML declarative -->
  <script type="module">
    import { closeLetterbox } from './scripts/letterbox.js';
    document.getElementById('lb-close').addEventListener('click', closeLetterbox);
  </script>

</body>
</html>
